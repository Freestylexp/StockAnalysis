name: Daily WeChat Report

on:
  schedule:
    # 北京时间 Mon-Fri 17:00（UTC 09:00）
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  push-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate PushPlus token
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "::error::未配置 PUSHPLUS_TOKEN。请到 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi
          echo "PUSHPLUS_TOKEN 已配置"

      - name: Generate and push daily report
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          APP_URL: ${{ secrets.APP_URL }}
          TZ: Asia/Shanghai
        run: python -u scripts/daily_push.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
