name: Daily Email Report

on:
  schedule:
    # 北京时间 Mon-Fri 12:00（UTC 04:00）；GitHub 可能延迟 0–15 分钟
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  email-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate email secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            echo "使用 Resend API（HTTPS，适合 GitHub 云端自动推送）"
            if [ -z "$EMAIL_TO" ]; then
              echo "::error::使用 RESEND_API_KEY 时必须配置 EMAIL_TO（收件邮箱）"
              exit 1
            fi
          elif [ -n "$SMTP_USER" ] && [ -n "$SMTP_PASSWORD" ]; then
            echo "::warning::仅配置了 SMTP。GitHub Actions 通常无法直连 QQ SMTP，请改用 RESEND_API_KEY。"
          else
            echo "::error::请配置 RESEND_API_KEY + EMAIL_TO（推荐），或 SMTP_USER + SMTP_PASSWORD（仅适合本地）"
            exit 1
          fi

      - name: Generate and email daily report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APP_URL: ${{ secrets.APP_URL }}
          TZ: Asia/Shanghai
        run: python -u scripts/daily_push.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
