name: Daily Email Report

on:
  schedule:
    # 北京时间 Mon-Fri 12:00（UTC 04:00）；GitHub 可能延迟 0–15 分钟
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  email-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate email secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "::error::请配置 SMTP_USER 和 SMTP_PASSWORD（QQ 邮箱授权码）"
            exit 1
          fi
          echo "SMTP_USER 已配置（${SMTP_USER:0:3}***）"
          if [ -n "$EMAIL_TO" ]; then
            echo "EMAIL_TO 已配置（${EMAIL_TO:0:3}***）"
          else
            echo "EMAIL_TO 未配置，将发到 SMTP_USER"
          fi

      - name: Test SMTP only
        if: github.event_name == 'workflow_dispatch'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python -u scripts/test_smtp.py

      - name: Generate and email daily report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APP_URL: ${{ secrets.APP_URL }}
          TZ: Asia/Shanghai
        run: python -u scripts/daily_push.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
