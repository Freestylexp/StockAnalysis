name: Daily Email Report

on:
  schedule:
    # 北京时间 Mon-Fri 12:00（UTC 04:00）；GitHub 可能延迟 0–15 分钟
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  email-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate email secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::GitHub 云端必须配置 RESEND_API_KEY（不能用 QQ SMTP）。"
            echo "注册 https://resend.com → API Keys → 复制 re_... → 添加到 Secrets"
            exit 1
          fi
          if [ -z "$EMAIL_TO" ]; then
            echo "::error::请配置 EMAIL_TO（收件邮箱，须与 Resend 注册邮箱一致）"
            exit 1
          fi
          echo "✅ 将使用 Resend API 发信（非 SMTP）"

      - name: Generate and email daily report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APP_URL: ${{ secrets.APP_URL }}
          TZ: Asia/Shanghai
        run: python -u scripts/daily_push.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
