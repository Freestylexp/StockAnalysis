name: Daily Email Report

on:
  schedule:
    # GitHub 只用 UTC！北京时间中午 12:00 = UTC 04:00（不是 cron 里的 12）
    # 错误示例：cron "0 16" → 北京时间 凌晨 00:00；cron "0 12" → 北京时间 晚上 20:00
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  email-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show trigger time (Beijing)
        run: |
          echo "GitHub cron 按 UTC 触发；本任务设定 UTC 04:00 = 北京时间 12:00（中午）"
          echo -n "当前北京时间: "
          TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z'
          echo -n "当前 UTC 时间: "
          date -u '+%Y-%m-%d %H:%M:%S UTC'

      - name: Validate email secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::GitHub 云端必须配置 RESEND_API_KEY（不能用 QQ SMTP）。"
            echo "注册 https://resend.com → API Keys → 复制 re_... → 添加到 Secrets"
            exit 1
          fi
          if [ -z "$EMAIL_TO" ]; then
            echo "::error::请配置 EMAIL_TO（收件邮箱，须与 Resend 注册邮箱一致）"
            exit 1
          fi
          echo "✅ 将使用 Resend API 发信（非 SMTP）"

      - name: Generate and email daily report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          APP_URL: ${{ secrets.APP_URL }}
          TZ: Asia/Shanghai
        run: python -u scripts/daily_push.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
