name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-hf:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::请配置 GitHub Secret: HF_TOKEN（Hugging Face Write Token）"
            echo "获取: https://huggingface.co/settings/tokens"
            exit 1
          fi
          echo "HF_TOKEN 已配置"

      - name: Sync repo to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Freestylexp/stock-portfolio-agent
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
